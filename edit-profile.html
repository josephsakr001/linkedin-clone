<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile | CareXpert</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="logo">CareXpert</div>
    <div class="nav-links">
      <a href="./index.html">Home</a>
      <a href="./register.html">Register</a>
      <a href="./login.html">Login</a>
      <a href="./search.html">Search</a>
      <a href="#" id="my-profile-link" style="display:none;">My Profile</a>
    </div>
  </nav>

  <main class="container">
    <h2>Edit Profile</h2>

    <form id="edit-profile-form">
      <input type="text" id="edit-name" placeholder="Full Name" required />

      <select id="edit-headline">
        <option value="">Select Care Type</option>
        <option value="Child Care">Child Care</option>
        <option value="Elder Care">Elder Care</option>
        <option value="Home Nursing Care">Home Nursing Care</option>
        <option value="Pregnancy & Maternity Care">Pregnancy & Maternity Care</option>
        <option value="Therapy & Rehab">Therapy & Rehab</option>
        <option value="Nutrition & Diet">Nutrition & Diet</option>
        <option value="Disability & Special Needs Care">Disability & Special Needs Care</option>
        <option value="Mental Health & Emotional Support Care">Mental Health & Emotional Support Care</option>
      </select>

      <div id="edit-service-options-box" class="service-options-box"></div>

      <input type="text" id="edit-skills" placeholder="Selected skills" readonly />

      <div id="edit-selected-skills" class="selected-skills"></div>

      <input type="text" id="edit-location" placeholder="Location" />

      <input type="text" id="edit-languages" placeholder="Languages spoken" />

      <div id="edit-availability-options-box" class="service-options-box">
  <button type="button" class="availability-chip service-chip" data-availability="Morning (AM)">Morning (AM)</button>
  <button type="button" class="availability-chip service-chip" data-availability="Afternoon (PM)">Afternoon (PM)</button>
  <button type="button" class="availability-chip service-chip" data-availability="Full Day">Full Day</button>
  <button type="button" class="availability-chip service-chip" data-availability="Full Time">Full Time</button>
  <button type="button" class="availability-chip service-chip" data-availability="Part Time">Part Time</button>
  <button type="button" class="availability-chip service-chip" data-availability="Flexible">Flexible</button>
  <button type="button" class="availability-chip service-chip" data-availability="Night Shift">Night Shift</button>
  <button type="button" class="availability-chip service-chip" data-availability="Weekend Only">Weekend Only</button>
  <button type="button" class="availability-chip service-chip" data-availability="On Call">On Call</button>
</div>

<input type="text" id="edit-availability" placeholder="Selected availability" readonly />

      <input type="text" id="edit-phone" placeholder="Phone" />
      <textarea id="edit-bio" rows="5" placeholder="Bio"></textarea>
      <input type="number" id="edit-salary-min" placeholder="Minimum Salary" />
      <input type="number" id="edit-salary-max" placeholder="Maximum Salary" />

<label class="upload-label">Change Profile Picture</label>
<input type="file" id="edit-avatar" accept="image/*" />

      <button type="submit">Save Changes</button>

      
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="./supabaseClient.js"></script>
  <script src="./app.js"></script>
</body>
</html>
