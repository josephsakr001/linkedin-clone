<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | CareExpert</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <nav class="navbar">
    <a class="brand" href="./index.html">CareXpert</a>

    <div class="nav-links">
      <a href="./index.html">Home</a>
      <a href="./register.html">Register</a>
      <a href="./login.html">Login</a>
      <a href="./search.html">Search</a>
      <a href="#" id="my-profile-link" style="display:none;">My Profile</a>
    </div>
  </nav>

  <main class="container">
    <h2>Welcome Back</h2>

    <p style="margin-bottom: 20px; color: var(--muted);">
      Log in to manage your caregiver profile or connect with families.
    </p>

    <form id="login-form">
      <input type="email" id="login-email" placeholder="Email address" required />
      <input type="password" id="login-password" placeholder="Password" required />
      
      <button type="submit">Log In</button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="./supabaseClient.js"></script>
  <script src="./app.js"></script>
</body>
</html>
