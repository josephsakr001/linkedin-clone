<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Profiles | CareXpert</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <nav class="navbar">
    <a class="brand" href="./index.html">CareXpert</a>

    <div class="nav-links">
      <a href="./index.html">Home</a>
      <a href="./register.html">Register</a>
      <a href="./login.html">Login</a>
      <a href="./search.html">Search</a>
      <a href="#" id="my-profile-link" style="display:none;">My Profile</a>
    </div>
  </nav>

  <main class="page">
    <div class="page-inner">
      <div class="search-header">
        <h1>Search Professionals</h1>
        <p>Find active professionals by name, location, role, or skill.</p>
      </div>

      <div class="search-panel">
        <div class="search-row">
          <div class="field">
            <label for="search-keyword">Name</label>
            <input id="search-keyword" type="text" placeholder="Search by name" />
          </div>

          <div class="field">
            <label for="search-location">Location</label>
           <select id="location" required>
           <option value="">Select Location</option>
              <option>Beirut</option>
              <option>Mount Lebanon</option>
              <option>North Lebanon</option>
              <option>Akkar</option>
             <option>Bekaa</option>
             <option>Baalbek-Hermel</option>
             <option>South Lebanon</option>
             <option>Nabatieh</option>
</select>
          </div>

      <div class="field">
  <label for="search-role">Role or Skill</label>
  <select id="search-role">
    <option value="">All Roles / Skills</option>
    <option value="Software Developer">Software Developer</option>
    <option value="Frontend Developer">Frontend Developer</option>
    <option value="Backend Developer">Backend Developer</option>
    <option value="Full Stack Developer">Full Stack Developer</option>
    <option value="UI/UX Designer">UI/UX Designer</option>
    <option value="Graphic Designer">Graphic Designer</option>
    <option value="Data Analyst">Data Analyst</option>
    <option value="Accountant">Accountant</option>
    <option value="Sales">Sales</option>
    <option value="Marketing">Marketing</option>
    <option value="HR">HR</option>
    <option value="Customer Support">Customer Support</option>
    <option value="Project Manager">Project Manager</option>
    <option value="Engineer">Engineer</option>
    <option value="Teacher">Teacher</option>
  </select>
</div>
      <div id="results" class="results-grid"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="./supabaseClient.js"></script>
  <script src="./app.js"></script>
</body>
</html>
