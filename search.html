<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find a Caregiver | CareExpert</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <nav class="navbar">
    <a class="brand" href="./index.html">CareExpert</a>

    <div class="nav-links">
      <a href="./index.html">Home</a>
      <a href="./register.html">Register</a>
      <a href="./login.html">Login</a>
      <a href="./search.html">Search</a>
      <a href="#" id="my-profile-link" style="display:none;">My Profile</a>
    </div>
  </nav>

  <main class="page">
    <div class="page-inner">
      <div class="search-header">
        <h1>Find a Caregiver</h1>
        <p>Browse active caregivers by name, location, care type, or skill.</p>
      </div>

      <div class="search-panel">
        <div class="search-row">
          <div class="field">
            <label for="search-keyword">Caregiver Name</label>
            <input id="search-keyword" type="text" placeholder="Search by caregiver name" />
          </div>

          <div class="field">
            <label for="search-location">Location</label>
            <select id="search-location">
              <option value="">Select Location</option>
              <option>Beirut</option>
              <option>Mount Lebanon</option>
              <option>North Lebanon</option>
              <option>Akkar</option>
              <option>Bekaa</option>
              <option>Baalbek-Hermel</option>
              <option>South Lebanon</option>
              <option>Nabatieh</option>
            </select>
          </div>

          <div class="field">
            <label for="search-role">Care Type </label>
            <select id="search-role">
              <option value="">All Care Types </option>
              <option value="Elderly Care">Elderly Care</option>
              <option value="Home Care">Home Care</option>
              <option value="Post-Surgery Support">Post-Surgery Support</option>
              <option value="Disability Support">Disability Support</option>
              <option value="Child Care">Child Care</option>
              <option value="Dementia Care">Dementia Care</option>
              <option value="Palliative Care">Palliative Care</option>
              <option value="Mobility Assistance">Mobility Assistance</option>
              <option value="Medication Support">Medication Support</option>
              <option value="Live-In Care">Live-In Care</option>
              <option value="Part-Time Care">Part-Time Care</option>
              <option value="Nursing Support">Nursing Support</option>
            </select>
          </div>
        </div>

        <div id="results" class="results-grid"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="./supabaseClient.js"></script>
  <script src="./app.js"></script>
</body>
</html>
