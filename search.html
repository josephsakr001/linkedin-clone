<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Profiles</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
<nav class="navbar">
  <a class="brand" href="./index.html">CareXpert</a>

  <div class="nav-links">
    <a href="./index.html">Home</a>
    <a href="./register.html">Register</a>
    <a href="./login.html">Login</a>
    <a href="./search.html">Search</a>
    <a href="#" id="my-profile-link" style="display:none;">My Profile</a>
  </div>
</nav>

  <main class="page">
    <div class="page-inner">
      <div class="search-header">
        <h1>Search Professionals</h1>
        <p>Find talent by name, location, or role.</p>
      </div>

      <div class="search-panel">
        <div class="search-row">
          <div class="field">
            <label for="search-keyword">Name</label>
            <input
              id="search-keyword"
              type="text"
              placeholder="Search by name"
            />
          </div>

          <div class="field">
            <label for="search-location">Location</label>
            <input
              id="search-location"
              type="text"
              list="lb-areas"
              placeholder="Search by location"
            />
            <datalist id="lb-areas">
              <option value="Beirut"></option>
              <option value="Mount Lebanon"></option>
              <option value="North Lebanon"></option>
              <option value="Akkar"></option>
              <option value="Bekaa"></option>
              <option value="Baalbek-Hermel"></option>
              <option value="South Lebanon"></option>
              <option value="Nabatieh"></option>
            </datalist>
          </div>

          <div class="field">
            <label for="search-role">Role or Skill</label>
            <input
              id="search-role"
              type="text"
              list="job-roles"
              placeholder="Search by role or skill"
            />
            <datalist id="job-roles">
              <option value="Software Developer"></option>
              <option value="Frontend Developer"></option>
              <option value="Backend Developer"></option>
              <option value="Full Stack Developer"></option>
              <option value="UI/UX Designer"></option>
              <option value="Graphic Designer"></option>
              <option value="Data Analyst"></option>
              <option value="Accountant"></option>
              <option value="Sales"></option>
              <option value="Marketing"></option>
              <option value="HR"></option>
              <option value="Customer Support"></option>
              <option value="Project Manager"></option>
              <option value="Engineer"></option>
              <option value="Teacher"></option>
            </datalist>
          </div>
        </div>
      </div>

      <div id="results" class="results-grid"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="./supabaseClient.js"></script>
  <script src="./app.js"></script>
</body>
</html>
