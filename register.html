<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | CareExpert</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <nav class="navbar">
    <a class="brand" href="./index.html">CareXpert</a>

    <div class="nav-links">
      <a href="./index.html">Home</a>
      <a href="./register.html">Register</a>
      <a href="./login.html">Login</a>
      <a href="./search.html">Search</a>
      <a href="#" id="my-profile-link" style="display:none;">My Profile</a>
    </div>
  </nav>

  <main class="container">
    <h1>Create Your Caregiver Profile</h1>

    <form id="register-form">
      <input type="text" id="name" placeholder="Full Name" required />

      <select id="headline" required>
        <option value="">Select your care role</option>
        <option>Elderly Caregiver</option>
        <option>Home Caregiver</option>
        <option>Post-Surgery Caregiver</option>
        <option>Disability Support Caregiver</option>
        <option>Child Caregiver</option>
        <option>Dementia Caregiver</option>
        <option>Palliative Caregiver</option>
        <option>Live-In Caregiver</option>
        <option>Part-Time Caregiver</option>
        <option>Nursing Assistant</option>
        <option>Private Nurse</option>
        <option>Companion Caregiver</option>
      </select>

      <div class="field">
        <select id="skill-select">
          <option value="">Select a care skill</option>
          <option value="Elderly Care">Elderly Care</option>
          <option value="Home Care">Home Care</option>
          <option value="Post-Surgery Support">Post-Surgery Support</option>
          <option value="Disability Support">Disability Support</option>
          <option value="Child Care">Child Care</option>
          <option value="Dementia Care">Dementia Care</option>
          <option value="Palliative Care">Palliative Care</option>
          <option value="Mobility Assistance">Mobility Assistance</option>
          <option value="Medication Support">Medication Support</option>
          <option value="Patient Hygiene">Patient Hygiene</option>
          <option value="Meal Preparation">Meal Preparation</option>
          <option value="Companionship">Companionship</option>
        </select>

        <input type="text" id="skills" placeholder="Selected care skills" readonly required />
      </div>

      <div id="selected-skills" class="selected-skills"></div>

      <select id="location" required>
        <option value="">Select Location</option>
        <option>Beirut</option>
        <option>Mount Lebanon</option>
        <option>North Lebanon</option>
        <option>Akkar</option>
        <option>Bekaa</option>
        <option>Baalbek-Hermel</option>
        <option>South Lebanon</option>
        <option>Nabatieh</option>
      </select>

      <div class="field">
        <input type="tel" id="phone" placeholder="Phone number: +961 03 123 456" required />
      </div>

      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />

      <div class="field">
        <label>Expected monthly rate</label>
        <div class="salary-range">
          <input type="number" id="salary-min" placeholder="From" min="0" />
          <span>to</span>
          <input type="number" id="salary-max" placeholder="To" min="0" />
        </div>
      </div>

      <textarea id="bio" placeholder="Tell families about your experience, care type, and availability"></textarea>

      <div class="field">
        <label for="avatar">Profile Picture</label>
        <input type="file" id="avatar" accept="image/*" />
      </div>

      <button type="submit">Continue to Packages</button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="./supabaseClient.js"></script>
  <script src="./app.js"></script>
</body>
</html>
