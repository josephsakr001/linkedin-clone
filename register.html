<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | CareXpert</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <nav class="navbar">
    <a class="brand" href="./index.html">CareXpert</a>

    <div class="nav-links">
      <a href="./index.html">Home</a>
      <a href="./register.html">Register</a>
      <a href="./login.html">Login</a>
      <a href="./search.html">Search</a>
      <a href="#" id="my-profile-link" style="display:none;">My Profile</a>
    </div>
  </nav>

  <main class="container">
    <h1>Create Your CV</h1>

    <form id="register-form">
      <input type="text" id="name" placeholder="Full Name" required />
<select id="headline" required>
  <option value="">Select your role</option>
  <option>Web Developer</option>
  <option>Frontend Developer</option>
  <option>Backend Developer</option>
  <option>Full Stack Developer</option>
  <option>UI/UX Designer</option>
  <option>Graphic Designer</option>
  <option>Data Analyst</option>
  <option>Accountant</option>
  <option>Sales</option>
  <option>Marketing</option>
  <option>HR</option>
  <option>Customer Support</option>
  <option>Project Manager</option>
  <option>Engineer</option>
  <option>Teacher</option>
</select>

<div class="field">
  <select id="skill-select">
    <option value="">Select a skill</option>
    <option value="JavaScript">JavaScript</option>
    <option value="HTML">HTML</option>
    <option value="CSS">CSS</option>
    <option value="React">React</option>
    <option value="Node.js">Node.js</option>
    <option value="UI/UX">UI/UX</option>
    <option value="Marketing">Marketing</option>
  </select>

  <input type="text" id="skills" placeholder="Selected skills" readonly required />
</div>

  <div id="selected-skills" class="selected-skills"></div>

  <input type="hidden" id="skills" required />
</div>
   <select id="location" required>
  <option value="">Select Location</option>
  <option>Beirut</option>
  <option>Mount Lebanon</option>
  <option>North Lebanon</option>
  <option>Akkar</option>
  <option>Bekaa</option>
  <option>Baalbek-Hermel</option>
  <option>South Lebanon</option>
  <option>Nabatieh</option>
</select>

      <div class="field">
        <input type="tel" id="phone" placeholder=" phone number : +961 03 123 456" required />
      </div>

      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />

      <div class="field">
        <label>price range</label>
        <div class="salary-range">
          <input type="number" id="salary-min" placeholder="From" min="0" />
          <span>to</span>
          <input type="number" id="salary-max" placeholder="To" min="0" />
        </div>
      </div>

      <textarea id="bio" placeholder="Short Bio"></textarea>

      <div class="field">
        <label for="avatar">Profile Picture</label>
        <input type="file" id="avatar" accept="image/*" />
      </div>

      <button type="submit">Continue to Packages</button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="./supabaseClient.js"></script>
  <script src="./app.js"></script>
</body>
</html>
