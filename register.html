<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="logo">CareXpert</div>
    <div class="nav-links">
      <a href="./index.html">Home</a>
      <a href="./register.html">Register</a>
      <a href="./login.html">Login</a>
      <a href="./search.html">Search</a>
      <a href="#" id="my-profile-link" style="display:none;">My Profile</a>
    </div>
  </nav>

  <main class="container">
    <h2>Create Your Profile</h2>

    <form id="register-form">

      <input type="text" id="name" placeholder="Full Name" required />

      <select id="headline" required>
        <option value="">Select Care Type</option>
        <option value="Child Care">Child Care</option>
        <option value="Elder Care">Elder Care</option>
        <option value="Home Nursing Care">Home Nursing Care</option>
        <option value="Pregnancy & Maternity Care">Pregnancy & Maternity Care</option>
        <option value="Therapy & Rehab">Therapy & Rehab</option>
        <option value="Nutrition & Diet">Nutrition & Diet</option>
        <option value="Disability & Special Needs Care">Disability & Special Needs Care</option>
        <option value="Mental Health & Emotional Support Care">Mental Health & Emotional Support Care</option>
      </select>

      
      <div class="field">
  <label>Select Service Types</label>

  <div id="service-options-box" class="service-options-box"></div>

  <button type="button" id="confirm-skills-btn" class="done-btn">Done</button>

  <input type="text" id="skills" placeholder="Selected services" readonly required />
</div>

<div id="selected-skills" class="selected-skills"></div>


      <select id="location" required>
        <option value="">Select Location</option>
        <option>Beirut</option>
        <option>Mount Lebanon</option>
        <option>North Lebanon</option>
        <option>South Lebanon</option>
        <option>Bekaa</option>
      </select>

      <input type="text" id="phone" placeholder="Phone number: +961 XX XXX XXX" required />

      <div class="salary-range">
        <input type="number" id="salary-min" placeholder="Min Salary ($)" />
        <input type="number" id="salary-max" placeholder="Max Salary ($)" />
      </div>

      <input type="text" id="languages" placeholder="Languages (e.g. Arabic, English)" />

      <select id="availability">
        <option value="">Select Availability</option>

        <optgroup label="Daily Availability">
          <option value="Morning (AM)">Morning (AM)</option>
          <option value="Afternoon (PM)">Afternoon (PM)</option>
          <option value="Full Day">Full Day</option>
        </optgroup>

        <optgroup label="Work Type">
          <option value="Full Time">Full Time</option>
          <option value="Part Time">Part Time</option>
          <option value="Flexible">Flexible</option>
        </optgroup>

        <optgroup label="Special">
          <option value="Night Shift">Night Shift</option>
          <option value="Weekend Only">Weekend Only</option>
          <option value="On Call">On Call</option>
        </optgroup>
      </select>

      <textarea id="bio" rows="4" placeholder="Short Bio"></textarea>

      <input type="file" id="avatar" accept="image/*" />

      <input type="email" id="email" placeholder="Email" required />

      <div class="password-wrap">
        <input type="password" id="password" placeholder="Password" required />
        <button type="button" id="toggle-password" class="toggle-password">Show</button>
      </div>

      <button type="submit">Continue</button>

    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="./supabaseClient.js"></script>
  <script src="./app.js"></script>

</body>
</html>
