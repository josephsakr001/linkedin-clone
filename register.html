<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | CareXpert</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <nav class="navbar">
    <a class="brand" href="./index.html">CareXpert</a>

    <div class="nav-links">
      <a href="./index.html">Home</a>
      <a href="./packages.html">Register</a>
      <a href="./login.html">Login</a>
      <a href="./search.html">Search</a>
      <a href="#" id="my-profile-link" style="display:none;">My Profile</a>
    </div>
  </nav>

  <main class="container">
    <h1>Create Your CV</h1>

    <form id="register-form">
      <input type="text" id="name" placeholder="Full Name" required />

      <input type="text" id="headline" placeholder="Headline (e.g., Web Developer)" required />
      <input type="text" id="skills" placeholder="Skills (comma separated: JS, HTML, CSS)" required />
      <input type="text" id="location" placeholder="Location (e.g., Beirut)" required />

      <div class="field">
        <input type="tel" id="phone" placeholder=" phone number : +961 03 123 456" required />
      </div>

      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />

      <div class="field">
        <label>price range</label>
        <div class="salary-range">
          <input type="number" id="salary-min" placeholder="From" min="0" />
          <span>to</span>
          <input type="number" id="salary-max" placeholder="To" min="0" />
        </div>
      </div>

      <textarea id="bio" placeholder="Short Bio"></textarea>

      <div class="field">
        <label for="avatar">Profile Picture</label>
        <input type="file" id="avatar" accept="image/*" />
      </div>

      <button type="submit">Continue to Packages</button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="./supabaseClient.js"></script>
  <script src="./app.js"></script>
</body>
</html>
